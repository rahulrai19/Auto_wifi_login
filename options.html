<!DOCTYPE html>
<html>
<head>
  <title> WiFi Auto Login Options</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 400px;
      margin: 20px auto;
      padding: 20px;
      background-color: #f9f9f9;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    h2 {
      margin-top: 0;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #555;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    button:hover {
      background-color: #005a9e;
    }
    #status {
      margin-top: 15px;
      font-size: 14px;
      color: green;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h2>WiFi Config</h2>
  <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Enter your credentials below. Click the extension icon on the login page to automatically log in.</p>
  <div class="form-group">
    <label for="username">Username / Roll No:</label>
    <input type="text" id="username" placeholder="Username">
  </div>
  <div class="form-group">
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Password">
  </div>
  <button id="saveBtn">Save Credentials</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
