<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      width: 340px;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 25px 0 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      position: relative;
    }

    .logo {
      width: 56px;
      height: 56px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.15);
      padding: 12px;
      border-radius: 50%;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      box-sizing: border-box;
    }

    .logo svg {
      width: 100%;
      height: 100%;
      fill: white;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    p.subtitle {
      margin: 5px 0 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      font-weight: 400;
    }

    .container {
      width: 100%;
      padding: 24px 20px;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-login {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
      margin-bottom: 16px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(56, 239, 125, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-toggle {
      background: white;
      color: #555;
      border: 1px solid #e1e4e8;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .btn-toggle:hover {
      background: #f8f9fa;
      color: #333;
      border-color: #d1d5da;
    }

    #editForm {
      display: none;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      margin-top: 16px;
    }

    #editForm.show {
      display: block;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5c6ac4;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e1e4e8;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      box-sizing: border-box;
      transition: all 0.3s ease;
      background: #fafbfc;
      color: #333;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      background: white;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-top: 8px;
    }
    
    .btn-save:hover {
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      transform: translateY(-1px);
    }

    #status {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #11998e;
      margin-top: 12px;
      height: 15px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    #status.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <!-- WiFi Logo SVG -->
      <svg viewBox="0 0 24 24">
        <path d="M12,21L15.6,16.2C14.6,15.45 13.35,15 12,15C10.65,15 9.4,15.45 8.4,16.2L12,21M12,3C7.95,3 4.21,4.34 1.2,6.6L3,9C5.5,7.12 8.62,6 12,6C15.38,6 18.5,7.12 21,9L22.8,6.6C19.79,4.34 16.05,3 12,3M12,9C9.3,9 6.81,9.89 4.8,11.4L6.6,13.8C8.1,12.67 9.97,12 12,12C14.03,12 15.9,12.67 17.4,13.8L19.2,11.4C17.19,9.89 14.7,9 12,9Z" />
      </svg>
    </div>
    <h2>WiFi</h2>
    <p class="subtitle">Auto Login Assistant</p>
  </div>

  <div class="container">
    <button id="loginBtn" class="btn btn-login">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
        <polyline points="10 17 15 12 10 7"></polyline>
        <line x1="15" y1="12" x2="3" y2="12"></line>
      </svg>
      Login Directly
    </button>
    
    <button id="toggleEditBtn" class="btn btn-toggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
      Manage Credentials
    </button>
    
    <div id="editForm">
      <div class="input-group">
        <label>Login Page URL</label>
        <input type="text" id="loginUrl" placeholder="e.g. 192.168.1.1">
      </div>
      <div class="input-group">
        <label>Username / Roll No</label>
        <input type="text" id="username" placeholder="Enter username">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      <button id="saveBtn" class="btn btn-save">Save Settings</button>
      <div id="status">Saved successfully!</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
